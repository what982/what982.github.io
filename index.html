<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>智慧课评系统 · 豆包AI · 班级管理 · 月度整合</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(145deg, #F4F7FC 0%, #EFF2F8 100%); font-family: system-ui, 'Segoe UI', 'PingFang SC', Roboto, sans-serif; padding: 20px 16px 40px; min-height: 100vh; color: #1E2F3E; }
        .container { max-width: 1400px; margin: 0 auto; }
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center;
            z-index: 2000; visibility: visible; opacity: 1; transition: 0.3s;
        }
        .login-overlay.hidden { visibility: hidden; opacity: 0; pointer-events: none; }
        .login-card {
            background: white; border-radius: 2rem; padding: 2rem; width: 90%; max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center;
        }
        .login-card h2 { color: #E56A4F; margin-bottom: 1.5rem; }
        .login-card input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border-radius: 2rem; border: 1px solid #ddd; font-size: 1rem; }
        .login-card button { background: #E56A4F; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 2rem; font-size: 1rem; cursor: pointer; width: 100%; }
        .login-card .error { color: red; margin-top: 0.5rem; font-size: 0.8rem; }
        .main-content { display: none; }
        .main-content.visible { display: block; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; background: rgba(255,255,255,0.6); padding: 6px 12px; border-radius: 60px; backdrop-filter: blur(4px); }
        .tab-btn { background: transparent; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; font-size: 0.85rem; cursor: pointer; color: #2C5A77; transition: 0.2s; }
        .tab-btn.active { background: linear-gradient(95deg, #F08B6A, #E56A4F); color: white; box-shadow: 0 4px 12px rgba(240,139,106,0.3); }
        .tab-pane { display: none; animation: fadeIn 0.2s ease; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: rgba(255,255,255,0.96); border-radius: 1.5rem; box-shadow: 0 8px 20px -6px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.6); margin-bottom: 1.5rem; overflow: hidden; }
        .card-header { background: #FFFFFFF0; padding: 0.9rem 1.5rem; border-bottom: 2px solid #FFE6DC; font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; color: #2C5A77; }
        .card-body { padding: 1.2rem; }
        .grid-2cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { font-weight: 600; font-size: 0.8rem; display: block; margin-bottom: 5px; color: #2C5A77; }
        input, textarea, select { width: 100%; padding: 0.6rem 0.9rem; border-radius: 1rem; border: 1px solid #DCE5EC; font-family: inherit; font-size: 0.9rem; background: white; }
        textarea { resize: vertical; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #F08B6A; box-shadow: 0 0 0 3px rgba(240,139,106,0.1); }
        .btn { border: none; padding: 6px 16px; border-radius: 40px; font-weight: 600; font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; background: white; border: 1px solid #D0DCE8; color: #2C5A77; transition: 0.2s; }
        .btn-primary { background: linear-gradient(95deg, #F08B6A, #E56A4F); color: white; border: none; }
        .btn-sm { padding: 4px 10px; font-size: 0.7rem; }
        .btn-danger { border-color: #FFB5A8; color: #D9583C; }
        .btn-success { background: #5CB89D; color: white; border: none; }
        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; align-items: flex-end; }
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 500px; }
        .data-table th, .data-table td { padding: 10px 8px; border-bottom: 1px solid #EDEFF2; text-align: left; vertical-align: middle; }
        .data-table th { background: #F8FAFE; font-weight: 600; }
        .student-check-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; max-height: 160px; overflow-y: auto; background: #F9FBFD; padding: 10px; border-radius: 1rem; }
        .student-check-item { display: inline-flex; align-items: center; gap: 6px; background: #F1F5F9; padding: 4px 12px; border-radius: 40px; }
        .slider-container { background: #F8FAFE; border-radius: 1rem; padding: 0.6rem 1rem; margin: 0.5rem 0; }
        .word-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
        .gen-card { background: #FFFDF5; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; border: 1px solid #FFE0D0; }
        .gen-card-header { font-weight: 700; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px dashed #FFDCC8; }
        .result-preview { background: #FFFEF8; border-radius: 1rem; padding: 0.8rem; border: 1px solid #FCE5D9; line-height: 1.5; white-space: pre-wrap; }
        .class-tag { background: #ffefcf; border-radius: 60px; padding: 6px 16px; display: inline-flex; align-items: center; gap: 8px; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1E2F3E; color: white; padding: 8px 20px; border-radius: 50px; font-size: 0.8rem; z-index: 2000; opacity: 0; transition: 0.2s; pointer-events: none; text-align: center; max-width: 90%; }
        .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 5px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .info-note { font-size: 0.7rem; background: #F0F4F9; border-radius: 30px; padding: 5px 10px; margin-top: 8px; }
        .editable-field { cursor: pointer; color: #E56A4F; }
        .editable-field:hover { text-decoration: underline; }
        .modal-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center;
            z-index: 1000; visibility: hidden; opacity: 0; transition: 0.15s;
        }
        .modal-mask.show { visibility: visible; opacity: 1; }
        .record-modal {
            background: white; border-radius: 1.5rem; width: 90%; max-width: 500px;
            padding: 1.5rem; box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }
        .record-modal h3 { margin-bottom: 1rem; color: #E56A4F; }
        .record-modal .form-group { margin-bottom: 1rem; }
        .record-modal .btn { margin-top: 0.5rem; }
        @media (max-width: 640px) { .card-header { flex-direction: column; align-items: flex-start; } .btn { padding: 6px 12px; } .tab-btn { padding: 6px 14px; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2>🔐 管理员登录</h2>
        <input type="text" id="loginUsername" placeholder="用户名" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="密码">
        <div id="loginError" class="error"></div>
        <button id="loginSubmitBtn">登 录</button>
    </div>
</div>

<div id="mainContent" class="main-content">
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="config">⚙️ 班级 & 学生管理</button>
            <button class="tab-btn" data-tab="record">📝 课堂记录生成</button>
            <button class="tab-btn" data-tab="monthly">📅 月度整合</button>
        </div>

        <!-- 选项卡1 -->
        <div id="tab-config" class="tab-pane active">
            <div class="card">
                <div class="card-header">🤖 豆包API 配置</div>
                <div class="card-body">
                    <div class="grid-2cols">
                        <div class="form-group"><label>API Key</label><input type="password" id="apiKey" placeholder="火山引擎 API Key"></div>
                        <div class="form-group"><label>接入点ID</label><input type="text" id="modelId" placeholder="ep-xxxxxxxxxx"></div>
                        <div class="form-group"><label>端点地址</label><input type="text" id="endpoint" value="https://ark.cn-beijing.volces.com/api/v3/chat/completions"></div>
                        <div class="flex-btns"><button id="testApiBtn" class="btn">🔍 测试</button><button id="saveApiBtn" class="btn btn-primary">💾 保存</button></div>
                    </div>
                    <div id="apiTestStatus" class="info-note"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">🏷️ 班级管理 <button id="addClassBtn" class="btn btn-sm btn-primary">➕ 新班级</button></div>
                <div class="card-body"><div class="flex-btns" id="classListContainer" style="flex-wrap:wrap; gap:8px;"></div><div class="info-note">点击班级可编辑，删除班级会清除该班级下所有学生及课堂记录</div></div>
            </div>
            <div class="card">
                <div class="card-header">👥 学生管理 <button id="batchDeleteStudentBtn" class="btn btn-sm btn-danger">🗑️ 批量删除</button></div>
                <div class="card-body">
                    <div class="grid-2cols" style="margin-bottom:1rem;">
                        <div class="form-group"><label>姓名</label><input type="text" id="stuName" placeholder="姓名"></div>
                        <div class="form-group"><label>班级</label><select id="stuClassSelect"></select></div>
                        <div class="flex-btns"><button id="addStudentBtn" class="btn btn-primary">➕ 添加学生</button><button id="clearStudentForm" class="btn">清空</button></div>
                    </div>
                    <div class="filter-bar">
                        <div class="form-group" style="flex:1"><label>班级筛选</label><select id="filterClassSelect"></select></div>
                        <div class="form-group" style="flex:1"><label>姓名搜索</label><input type="text" id="searchNameInput" placeholder="学生姓名"></div>
                        <button id="refreshStudentListBtn" class="btn btn-sm">刷新</button>
                    </div>
                    <div class="table-wrapper"><table class="data-table"><thead><tr><th><input type="checkbox" id="selectAllStudentsCheckbox"></th><th>学号</th><th>姓名</th><th>班级</th><th>操作</th></tr></thead><tbody id="studentTbody"></tbody></table></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">💾 数据备份与迁移</div>
                <div class="card-body"><div class="flex-btns"><button id="exportDataBtn" class="btn btn-primary">📤 导出备份(JSON)</button><button id="importDataBtn" class="btn">📥 导入备份(JSON)</button><button id="clearAllDataBtn" class="btn btn-danger">⚠️ 清空所有数据</button></div><div class="info-note">💡 导出备份后可实现数据迁移，导入将覆盖云端数据库所有内容。</div></div>
            </div>
        </div>

        <!-- 选项卡2 -->
        <div id="tab-record" class="tab-pane">
            <div class="card">
                <div class="card-header">✨ 生成课评（可编辑后再保存）</div>
                <div class="card-body">
                    <div class="slider-container"><div class="word-row"><label>🎯 目标字数/生</label><span id="wordCountValue" style="background:#E9EDF2; padding:0.2rem 1rem; border-radius:30px;">130</span></div><input type="range" id="wordSlider" min="60" max="300" value="130" step="5"></div>
                    <div class="filter-bar"><select id="classFilterSelectGen" style="width:150px;"><option value="">全部班级</option></select><input type="text" id="nameFilterSelectGen" placeholder="姓名搜索" style="width:150px;"><button id="refreshStudentListGenBtn" class="btn btn-sm">刷新可选学生</button></div>
                    <div id="studentChecklist" class="student-check-group"></div>
                    <div class="grid-2cols" style="margin-top:12px;"><div class="form-group"><label>📖 课堂内容</label><textarea id="classContentInput" rows="2" placeholder="课堂内容"></textarea></div><div class="form-group"><label>💬 通用表现（参考）</label><textarea id="generalPerf" rows="2" placeholder="通用表现"></textarea></div></div>
                    <div class="perf-panel" style="margin-top:12px;"><div class="perf-title" id="toggleIndividualBtn" style="font-weight:700; cursor:pointer; color:#F08B6A;">👤 按学生单独填写表现（优先级高） ▼</div><div id="individualPerfArea" style="display:none; background:#FFFDF6; border-radius:1rem; padding:12px; margin-top:8px;"></div></div>
                    <div class="flex-btns" style="margin-top:12px;"><button id="generatePreviewBtn" class="btn btn-primary">✨ 生成课评预览（可编辑）</button></div>
                    <div id="generatedPreviews" style="margin-top:16px;"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><span>📋 课堂记录</span><div class="flex-btns"><button id="batchDeleteBtn" class="btn btn-sm btn-danger">🗑️ 批量删除</button><button id="selectAllRecordsBtn" class="btn btn-sm">✅ 全选</button><button id="addRecordBtn" class="btn btn-sm btn-primary">➕ 新增记录</button></div></div>
                <div class="card-body">
                    <div class="filter-bar">
                        <div class="form-group" style="flex:1; margin-bottom:0;"><label>🏫 班级筛选</label><select id="recordClassFilter"><option value="">全部班级</option></select></div>
                        <div class="form-group" style="flex:1; margin-bottom:0;"><label>🔍 学生姓名</label><input type="text" id="recordNameSearch" placeholder="输入学生姓名"></div>
                        <button id="searchRecordsBtn" class="btn btn-sm">🔍 筛选</button><button id="resetRecordsBtn" class="btn btn-sm">重置</button>
                    </div>
                    <div class="table-wrapper"><table class="data-table"><thead><tr><th><input type="checkbox" id="recordSelectAllCheckbox"></th><th>学生</th><th>班级</th><th>课堂内容</th><th>课评</th><th>时间</th><th>操作</th></tr></thead><tbody id="recordTbody"></tbody></table></div>
                </div>
            </div>
        </div>

        <!-- 选项卡3 -->
        <div id="tab-monthly" class="tab-pane">
            <div class="card">
                <div class="card-header">📅 月度课评整合（可编辑/复制）</div>
                <div class="card-body">
                    <div class="filter-bar" style="margin-bottom: 16px;">
                        <div class="form-group" style="flex:1; margin-bottom:0;"><label>🏫 班级筛选</label><select id="monthlyClassFilter"><option value="">全部班级</option></select></div>
                        <div class="form-group" style="flex:1; margin-bottom:0;"><label>🔍 姓名搜索</label><input type="text" id="monthlyNameSearch" placeholder="输入学生姓名"></div>
                        <button id="refreshMonthlyStudentBtn" class="btn btn-sm">刷新学生列表</button>
                    </div>
                    <div class="form-group"><label>👩‍🎓 选择学生</label><select id="studentSelect"><option value="">-- 请先添加学生 --</option></select></div>
                    <div class="form-group"><label>📆 选择月份</label><input type="month" id="monthPicker"></div>
                    <div class="slider-container"><div style="display:flex; justify-content:space-between;"><span>🎯 月度总结目标字数</span><span id="targetWordDisplay">180</span></div><input type="range" id="monthWordSlider" min="80" max="400" value="180" step="10"></div>
                    <div class="flex-btns"><button id="viewRecordsBtn" class="btn">📋 查看本月记录</button><button id="generateSummaryBtn" class="btn btn-primary">✨ 生成AI总结</button></div>
                    <div style="margin-top:20px;"><strong>📚 课堂内容汇总</strong><button id="copyContentSummaryBtn" class="btn btn-sm" style="margin-left:10px;">📋 复制</button><div id="classContentSummary" class="result-preview" style="margin-top:6px;">-</div></div>
                    <div style="margin-top:20px;"><strong>🤖 月度总结（可编辑）</strong><button id="copyMonthlySummaryBtn" class="btn btn-sm" style="margin-left:10px;">📋 复制</button><textarea id="monthlySummaryEditable" rows="6" class="result-preview" style="width:100%; margin-top:6px;"></textarea></div>
                    <div class="info-note">💡 基于该生本月所有已保存的课评记录，调用豆包整合成连贯的月度总结。</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<!-- 新增记录模态框 -->
<div id="addRecordModal" class="modal-mask">
    <div class="record-modal">
        <h3>📝 新增课堂记录</h3>
        <div class="form-group"><label>选择学生</label><select id="modalStudentSelect"></select></div>
        <div class="form-group"><label>课堂内容</label><textarea id="modalClassContent" rows="2" placeholder="课堂内容"></textarea></div>
        <div class="form-group"><label>课评</label><textarea id="modalReviewText" rows="4" placeholder="课评内容"></textarea></div>
        <div class="form-group"><label>记录时间</label><input type="datetime-local" id="modalRecordDate"></div>
        <div class="flex-btns" style="justify-content: flex-end; gap: 10px;">
            <button id="closeModalBtn" class="btn">取消</button>
            <button id="confirmAddRecordBtn" class="btn btn-primary">保存</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== 登录验证 ==========
        const ADMIN_USERNAME = "what";
        const ADMIN_PASSWORD = "what123";
        const loginOverlay = document.getElementById('loginOverlay');
        const mainContent = document.getElementById('mainContent');
        const loginSubmitBtn = document.getElementById('loginSubmitBtn');
        const loginError = document.getElementById('loginError');

        function checkLoginStatus() {
            const logged = localStorage.getItem('eggy_admin_logged') === 'true';
            if (logged) {
                loginOverlay.classList.add('hidden');
                mainContent.classList.add('visible');
                initMainSystem();
            } else {
                loginOverlay.classList.remove('hidden');
                mainContent.classList.remove('visible');
            }
        }
        function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                localStorage.setItem('eggy_admin_logged', 'true');
                loginOverlay.classList.add('hidden');
                mainContent.classList.add('visible');
                initMainSystem();
            } else {
                loginError.innerText = '用户名或密码错误';
            }
        }
        loginSubmitBtn.addEventListener('click', doLogin);
        document.getElementById('loginPassword').addEventListener('keypress', (e) => { if(e.key === 'Enter') doLogin(); });
        document.getElementById('loginUsername').addEventListener('keypress', (e) => { if(e.key === 'Enter') doLogin(); });

        // ========== 主系统 ==========
        let supabase, db;
        let classes = [], students = [], records = [];
        let individualPerfMap = {};
        let currentTab = "config";
        let currentRecordClassFilter = "", currentRecordNameFilter = "";

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toastMsg');
            if (!toast) return;
            toast.textContent = msg;
            toast.style.background = isError ? '#D9583C' : '#1E2F3E';
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2500);
        }
        function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
        function getClassNameById(classId) { return classes.find(c => c.id === classId)?.name || '未知班级'; }
        function generateStuId() { return 'S' + Date.now() + Math.floor(Math.random() * 10000); }

        function initSupabase() {
            if (window.supabase && typeof window.supabase.createClient === 'function') {
                supabase = window.supabase;
                const SUPABASE_URL = "https://jquoooxqmwlqnqkpfxrm.supabase.co";
                const SUPABASE_ANON_KEY = "sb_publishable_bkQDJ3_R0zStq2yia6zotw_tPh_ePvV";
                db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } else {
                console.error('Supabase 库未加载');
                showToast('Supabase 库加载失败', true);
            }
        }

        const TABLES = { classes: 'review_classes', students: 'review_students', records: 'review_records' };
        const RECORD_DATE_COL = 'recorddate';

        async function loadClasses() {
            const { data, error } = await db.from(TABLES.classes).select('*').order('id');
            if (error) { console.error(error); showToast('加载班级失败: ' + error.message, true); return []; }
            return data || [];
        }
        async function loadStudents() {
            const { data, error } = await db.from(TABLES.students).select('*').order('id');
            if (error) { console.error(error); showToast('加载学生失败: ' + error.message, true); return []; }
            return data || [];
        }
        async function loadRecords() {
            const { data, error } = await db.from(TABLES.records).select('*').order(RECORD_DATE_COL, { ascending: false });
            if (error) { console.error(error); showToast('加载课评失败: ' + error.message, true); return []; }
            return data || [];
        }
        async function refreshAllData() {
            try {
                classes = await loadClasses();
                students = await loadStudents();
                records = await loadRecords();
                console.log(`数据加载完成: ${classes.length}个班级, ${students.length}个学生, ${records.length}条记录`);
                renderAllByTab();
            } catch (err) {
                console.error(err);
                showToast('数据加载失败', true);
            }
        }

        // 数据库写操作
        async function addOrUpdateClass(id, name) {
            if (id) await db.from(TABLES.classes).update({ name }).eq('id', id);
            else await db.from(TABLES.classes).insert({ id: Date.now(), name });
            await refreshAllData();
        }
        async function deleteClassById(classId) {
            const relatedStudents = students.filter(s => s.classId === classId);
            for (let stu of relatedStudents) {
                await db.from(TABLES.records).delete().eq('studentId', stu.id);
                await db.from(TABLES.students).delete().eq('id', stu.id);
            }
            await db.from(TABLES.classes).delete().eq('id', classId);
            await refreshAllData();
            showToast('班级及关联数据已删除');
        }
        async function addOrUpdateStudent(student) {

                const newId = Date.now();

        async function saveRecordToDB(record) {

            const classIdNum = Number(record.classId);

            if (isNaN(classIdNum) || classIdNum < 1) { showToast('班级ID无效', true); return; }
            const recordForDb = {
                id: Math.floor(Number(record.id)),
                studentId: studentIdNum,
                studentName: String(record.studentName),
                classId: classIdNum,
                classContent: String(record.classContent),
                reviewText: String(record.reviewText),
                recorddate: String(record.recordDate)
            };
            const { error } = await db.from(TABLES.records).insert(recordForDb);
            if (error) { console.error(error); showToast('保存失败: ' + error.message, true); return; }
            await refreshAllData();
            showToast('保存成功');

        function renderIndividualPerfInputs(filteredStudents) {
            const area = document.getElementById('individualPerfArea');
            if (!area) return;
            if (filteredStudents.length === 0) { area.innerHTML = '<div class="info-note">无学生</div>'; return; }
            let html = '';

            });
            area.innerHTML = html;
            document.querySelectorAll('.ind-perf-input').forEach(inp => inp.addEventListener('change', (e) => { const sid = parseInt(inp.dataset.id); individualPerfMap[sid] = inp.value.trim(); }));

        async function generatePreviews() {
            const classContent = document.getElementById('classContentInput').value.trim();
            if (!classContent) { showToast('请填写课堂内容', true); return; }
            const selectedBoxes = Array.from(document.querySelectorAll('.stuCheckItem:checked'));
            if (selectedBoxes.length === 0) { showToast('请至少选择一位学生', true); return; }
            const targetWords = parseInt(document.getElementById('wordSlider').value);
            const generalPerf = document.getElementById('generalPerf').value.trim();
            const apiConfig = { apiKey: document.getElementById('apiKey').value.trim(), modelId: document.getElementById('modelId').value.trim(), endpoint: document.getElementById('endpoint').value.trim() };
            if (!apiConfig.apiKey || !apiConfig.modelId) { showToast('请先配置豆包API', true); return; }
            const genBtn = document.getElementById('generatePreviewBtn');
            genBtn.disabled = true; genBtn.innerHTML = '<span class="loading-spinner"></span> 生成中...';
            const container = document.getElementById('generatedPreviews');
            container.innerHTML = '<div class="info-note">⏳ 正在生成...</div>';
            const results = [];
            for (const cb of selectedBoxes) {
                const sid = parseInt(cb.value);
                const student = students.find(s => s.id === sid);
                if (!student) continue;
                const perf = individualPerfMap[sid] || generalPerf || '';
                try {
                    const prompt = `请为“${student.name}”同学写一段课后评价，要求：
1. 开头必须为“${student.name}本节课……”，结合课堂内容“${classContent}”。
2. 字数严格控制在${targetWords}字左右，口语化亲切自然。
3. 重点围绕学习态度、参与度等角度。具体表现：“${perf}”。
4. 绝对不能出现“你”字！
5. 结尾emoji加一句建议。
直接输出评价文本。`;
                    const res = await fetch(apiConfig.endpoint, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiConfig.apiKey}` },
                        body: JSON.stringify({ model: apiConfig.modelId, messages: [{ role: 'user', content: prompt }], max_tokens: Math.min(400, targetWords * 2 + 50), temperature: 0.85 })
                    });
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    let review = data.choices?.[0]?.message?.content?.trim() || '生成失败';
                    review = review.replace(/你/g, student.name);
                    if (!review.startsWith(student.name)) review = student.name + '本节课' + review;
                    results.push({ studentId: student.id, studentName: student.name, classId: student.classId, classContent, reviewText: review });
                } catch (err) { results.push({ studentId: student.id, studentName: student.name, classId: student.classId, classContent, reviewText: `生成失败: ${err.message}` }); }
            }
            container.innerHTML = results.map((res, idx) => `<div class="gen-card" data-idx="${idx}"><div class="gen-card-header"><span>👩‍🎓 ${escapeHtml(res.studentName)}</span><div><button class="btn btn-sm copy-single-btn" data-idx="${idx}">📋 复制课评</button><button class="btn btn-sm btn-success save-single-btn" data-idx="${idx}">💾 保存到记录</button></div></div><textarea class="gen-card-content" data-idx="${idx}" rows="5">${escapeHtml(res.reviewText)}</textarea></div>`).join('');
            results.forEach((res, idx) => {
                const copyBtn = container.querySelector(`.copy-single-btn[data-idx="${idx}"]`);
                const saveBtn = container.querySelector(`.save-single-btn[data-idx="${idx}"]`);
                const textarea = container.querySelector(`.gen-card-content[data-idx="${idx}"]`);
                if (copyBtn) copyBtn.onclick = () => { navigator.clipboard.writeText(textarea.value); showToast(`已复制 ${res.studentName}`); };
                if (saveBtn) saveBtn.onclick = async () => {
                    const finalReview = textarea.value.trim();
                    if (finalReview.includes('生成失败')) { showToast('课评无效', true); return; }
                    const now = new Date();
                    const recordTime = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
                    await saveRecordToDB({ id: Date.now() + Math.floor(Math.random() * 10000), studentId: res.studentId, studentName: res.studentName, classId: res.classId, classContent: res.classContent, reviewText: finalReview, recordDate: recordTime });
                    showToast(`已保存 ${res.studentName}`);
                    const card = saveBtn.closest('.gen-card'); if(card) card.remove();
                };
            });
            genBtn.disabled = false; genBtn.innerHTML = '✨ 生成课评预览（可编辑）';
        }

            const targetWords = parseInt(document.getElementById('monthWordSlider').value);

            });

            // 学生管理
            document.getElementById('addStudentBtn').addEventListener('click', handleAddOrUpdateStudent);
            document.getElementById('clearStudentForm').addEventListener('click', () => { document.getElementById('stuName').value=''; const addBtn=document.getElementById('addStudentBtn'); delete addBtn.dataset.editId; addBtn.innerText='➕ 添加学生'; });
            document.getElementById('refreshStudentListBtn').addEventListener('click', () => refreshStudentTable());
            document.getElementById('batchDeleteStudentBtn').addEventListener('click', batchDeleteStudents);

            // 课评生成
            document.getElementById('refreshStudentListGenBtn').addEventListener('click', refreshStudentSelectors);
            document.getElementById('generatePreviewBtn').addEventListener('click', generatePreviews);
            document.getElementById('classFilterSelectGen').addEventListener('change', refreshStudentSelectors);
            document.getElementById('nameFilterSelectGen').addEventListener('input', refreshStudentSelectors);
            document.getElementById('toggleIndividualBtn').addEventListener('click', () => { const area=document.getElementById('individualPerfArea'); area.style.display = area.style.display==='none' ? 'block' : 'none'; });

            // 课堂记录列表
            document.getElementById('searchRecordsBtn').addEventListener('click', () => refreshRecordList());
            document.getElementById('resetRecordsBtn').addEventListener('click', () => { document.getElementById('recordClassFilter').value=''; document.getElementById('recordNameSearch').value=''; refreshRecordList(); });
            document.getElementById('batchDeleteBtn').addEventListener('click', batchDeleteRecords);
            document.getElementById('selectAllRecordsBtn').addEventListener('click', () => { const cb=document.getElementById('recordSelectAllCheckbox'); cb.checked=!cb.checked; selectAllRecords(); });
            document.getElementById('recordSelectAllCheckbox').addEventListener('change', selectAllRecords);
            document.getElementById('recordClassFilter').addEventListener('change', () => refreshRecordList());
            document.getElementById('recordNameSearch').addEventListener('input', () => refreshRecordList());

            // 手动新增记录模态框
            const addRecordBtn = document.getElementById('addRecordBtn');
            const modal = document.getElementById('addRecordModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const confirmAddBtn = document.getElementById('confirmAddRecordBtn');
            addRecordBtn.addEventListener('click', () => {
                const modalSel = document.getElementById('modalStudentSelect');
                if (modalSel && students.length) {
                    modalSel.innerHTML = '<option value="">请选择学生</option>' + students.map(s => `<option value="${s.id}" data-name="${escapeHtml(s.name)}" data-class="${s.classId}">${escapeHtml(s.name)} (${getClassNameById(s.classId)})</option>`).join('');
                }
                document.getElementById('modalClassContent').value = '';
                document.getElementById('modalReviewText').value = '';
                document.getElementById('modalRecordDate').value = new Date().toISOString().slice(0,16);
                modal.classList.add('show');
            });
            closeModalBtn.addEventListener('click', () => modal.classList.remove('show'));
            confirmAddBtn.addEventListener('click', async () => {
                const studentId = document.getElementById('modalStudentSelect').value;
                if (!studentId) { showToast('请选择学生', true); return; }
                const student = students.find(s => s.id == studentId);
                const classContent = document.getElementById('modalClassContent').value.trim();
                const reviewText = document.getElementById('modalReviewText').value.trim();
                let recordDate = document.getElementById('modalRecordDate').value;
                if (!classContent) { showToast('请填写课堂内容', true); return; }
                if (!reviewText) { showToast('请填写课评', true); return; }
                if (!recordDate) recordDate = new Date().toISOString().slice(0,16).replace('T', ' ') + ':00';
                else recordDate = recordDate.replace('T', ' ') + ':00';
                await addManualRecord(student.id, student.name, student.classId, classContent, reviewText, recordDate);
                modal.classList.remove('show');
            });

            // 月度整合
            document.getElementById('viewRecordsBtn').addEventListener('click', viewMonthRecords);
            document.getElementById('generateSummaryBtn').addEventListener('click', generateMonthlySummary);
            document.getElementById('copyContentSummaryBtn').addEventListener('click', () => { const text=document.getElementById('classContentSummary').innerText; if(text && text!=='-') navigator.clipboard.writeText(text); showToast('已复制'); });
            document.getElementById('copyMonthlySummaryBtn').addEventListener('click', () => { const text=document.getElementById('monthlySummaryEditable').value; if(text) navigator.clipboard.writeText(text); showToast('已复制'); });
            document.getElementById('monthlyClassFilter').addEventListener('change', refreshMonthlyStudentSelect);
            document.getElementById('monthlyNameSearch').addEventListener('input', refreshMonthlyStudentSelect);
            document.getElementById('refreshMonthlyStudentBtn').addEventListener('click', refreshMonthlyStudentSelect);

            // 班级管理、备份等
            document.getElementById('addClassBtn').addEventListener('click', async () => { const newName = prompt('班级名称'); if(newName) await addOrUpdateClass(null, newName.trim()); });
            document.getElementById('exportDataBtn').addEventListener('click', exportData);
            document.getElementById('importDataBtn').addEventListener('click', () => { const inp=document.createElement('input'); inp.type='file'; inp.accept='.json'; inp.onchange=e=>{ if(e.target.files[0]) importData(e.target.files[0]); }; inp.click(); });
            document.getElementById('clearAllDataBtn').addEventListener('click', clearAllData);
            document.getElementById('saveApiBtn').addEventListener('click', () => { const cfg={apiKey:document.getElementById('apiKey').value.trim(),modelId:document.getElementById('modelId').value.trim(),endpoint:document.getElementById('endpoint').value.trim()}; if(cfg.apiKey && cfg.modelId) localStorage.setItem('doubao_api_config_local',JSON.stringify(cfg)); showToast('API配置已保存'); });
            document.getElementById('testApiBtn').addEventListener('click', async () => { const cfg={apiKey:document.getElementById('apiKey').value.trim(),modelId:document.getElementById('modelId').value.trim(),endpoint:document.getElementById('endpoint').value.trim()}; if(!cfg.apiKey||!cfg.modelId){ showToast('请填写完整',true); return; } try{ const res=await fetch(cfg.endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.apiKey}`},body:JSON.stringify({model:cfg.modelId,messages:[{role:'user',content:'ok'}],max_tokens:5})}); if(res.ok) showToast('✅ 连接成功'); else showToast('❌ 鉴权失败',true); }catch(e){ showToast('网络错误',true); } });

            // 滑块和日期
            document.getElementById('wordSlider').addEventListener('input', (e) => document.getElementById('wordCountValue').innerText = e.target.value);
            document.getElementById('monthWordSlider').addEventListener('input', (e) => document.getElementById('targetWordDisplay').innerText = e.target.value);
            const monthPicker = document.getElementById('monthPicker');
            if (monthPicker && !monthPicker.value) monthPicker.value = new Date().toISOString().slice(0,7);
            document.getElementById('filterClassSelect').addEventListener('change', () => refreshStudentTable());
            document.getElementById('searchNameInput').addEventListener('input', () => refreshStudentTable());

            const savedApi = localStorage.getItem('doubao_api_config_local');
            if(savedApi) { const cfg=JSON.parse(savedApi); document.getElementById('apiKey').value=cfg.apiKey||''; document.getElementById('modelId').value=cfg.modelId||''; document.getElementById('endpoint').value=cfg.endpoint||''; }

            refreshClassSelects();
            renderAllByTab();
            console.log('初始化完成，所有事件已绑定');
        }

        checkLoginStatus();
    })();
</script>
</body>
</html>
